name: AppForgeStudio

options:
  bundleIdPrefix: com.appforgestudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    INFOPLIST_FILE: AppForgeStudio/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.appforgestudio.app
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Satin:
    url: https://github.com/Hi-Rez/Satin.git
    from: 13.0.0

targets:
  AppForgeStudio:
    type: application
    platform: iOS
    sources:
      - path: Core/UI
      - path: Core/Managers
      - path: Features/CADMode
      - path: Features/SculptMode
      - path: Features/PaintMode
      - path: Features/ExportMode
      - path: Features/AnimationMode
      - path: Features/HybridMode
      - path: Features/RenderMode
      - path: Sources/Engines
      - path: Sources/CSG
      - path: Sources/CAD
      - path: Sources/Shaders
      - path: Sources/Services
      - path: Sources/Theme
      - path: Sources/RenderEngine
      - path: Resources
        type: folder
        createFolderReferences: false
      - path: Sources/Shaders/BooleanComputeShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/IBLComputeShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/IBLShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/PBRShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/Shaders.metal
        type: file
        buildPhase: sources
    settings:
      base:
        INFOPLIST_FILE: AppForgeStudio/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.appforgestudio.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - package: Satin
    preBuildScripts:
      - name: Generate Info.plist
        script: |
          if [ ! -f "$SRCROOT/AppForgeStudio/Info.plist" ]; then
            mkdir -p "$SRCROOT/AppForgeStudio"
            cat > "$SRCROOT/AppForgeStudio/Info.plist" <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key>
    <string>en</string>
    <key>CFBundleDisplayName</key>
    <string>AppForge Studio</string>
    <key>CFBundleExecutable</key>
    <string>$(EXECUTABLE_NAME)</string>
    <key>CFBundleIdentifier</key>
    <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
    <key>CFBundleInfoDictionaryVersion</key>
    <string>6.0</string>
    <key>CFBundleName</key>
    <string>$(PRODUCT_NAME)</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
    <key>UILaunchScreen</key>
    <dict/>
    <key>UISupportedInterfaceOrientations~ipad</key>
    <array>
        <string>UIInterfaceOrientationLandscapeLeft</string>
        <string>UIInterfaceOrientationLandscapeRight</string>
        <string>UIInterfaceOrientationPortrait</string>
    </array>
    <key>UIRequiredDeviceCapabilities</key>
    <array>
        <string>metal</string>
    </array>
</dict>
</plist>
EOF
          fi

  AppForgeStudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        INFOPLIST_FILE: AppForgeStudio/Info.plist
    dependencies:
      - target: AppForgeStudio
