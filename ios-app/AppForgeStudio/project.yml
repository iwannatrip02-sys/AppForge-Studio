name: AppForgeStudio

options:
  bundleIdPrefix: com.appforgestudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    INFOPLIST_FILE: AppForgeStudio/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.appforgestudio.app
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    CODE_SIGN_STYLE: Automatic
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: "x86_64 i386"

packages:
  Satin:
    url: https://github.com/Hi-Rez/Satin.git
    # Pinned to the exact revision mirrored in vendor/Satin (repo is archived;
    # main == final state). Local vendor copy is the API source of truth.
    revision: a91c469f517cef1946d5ed4dd9771df4843a30ef
  OCCTSwift:
    url: https://github.com/gsdali/OCCTSwift.git
    from: 1.0.0

targets:
  AppForgeStudio:
    type: application
    platform: iOS
    sources:
      - path: Core/UI
      - path: Core/Managers
      - path: Core/Services/ExportService
      - path: Features/Home
      - path: Features/CADMode
      - path: Features/SculptMode
      - path: Features/PaintMode
      - path: Features/ExportMode
      - path: Features/AnimationMode
      - path: Features/HybridMode
      - path: Sources/Engines
      - path: Sources/CSG
      - path: Sources/CAD
      - path: Sources/Shaders
      - path: Sources/Services
      - path: Sources/Theme
      - path: Sources/RenderEngine
      # Recursos individuales (NUNCA type: folder — un dir Resources/ literal dentro
      # del .app hace que iOS lo trate como bundle deep y falle la instalación)
      - path: Resources
        excludes:
          - "Localizable.strings"
      - path: Sources/Shaders/BooleanComputeShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/IBLComputeShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/IBLShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/PBRShaders.metal
        type: file
        buildPhase: sources
      - path: Sources/Shaders/Shaders.metal
        type: file
        buildPhase: sources
    settings:
      base:
        INFOPLIST_FILE: AppForgeStudio/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.appforgestudio.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ONLY_ACTIVE_ARCH: "YES"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: "x86_64 i386"
        OTHER_CFLAGS[sdk=iphonesimulator*]: "$(inherited) -Wno-c++11-narrowing"
        GCC_TREAT_WARNINGS_AS_ERRORS: "NO"
    dependencies:
      - package: Satin
      - package: OCCTSwift

  AppForgeStudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        # Bundle de tests: plist propio (BNDL) y bundle ID distinto al de la app.
        # Compartir INFOPLIST_FILE/bundle ID con la app rompe la instalación en simulador.
        INFOPLIST_FILE: AppForgeStudioTests-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.appforgestudio.app.tests
    dependencies:
      - target: AppForgeStudio
      - package: OCCTSwift

  # Ola GestureProbe (carril G-A): runner XCUITest que sintetiza gestos REALES
  # del sistema (tap/drag/2-dedos/pinch) sobre la UI real y modela un engranaje.
  # Invariantes ci_infra: plist PROPIO (BNDL), bundle id DISTINTO
  # (com.appforgestudio.app.uitests — compartirlo rompe la instalación con
  # "Missing bundle ID"), firma ad-hoc idéntica al resto (Manual / - / --deep,
  # pasada en el xcodebuild test del CI). type bundle.ui-testing hace que
  # XcodeGen genere el runner XCUITest y, con TEST_TARGET_NAME, cablee la app
  # bajo prueba (sin TEST_HOST/BUNDLE_LOADER — el runner se inyecta solo).
  AppForgeStudioUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        INFOPLIST_FILE: AppForgeStudioUITests-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.appforgestudio.app.uitests
        TEST_TARGET_NAME: AppForgeStudio
    dependencies:
      - target: AppForgeStudio
