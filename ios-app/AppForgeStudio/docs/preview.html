<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=1024"><title>AppForge Studio v2.0 — Shapr3D-style</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#E6EDF3;display:flex;justify-content:center;align-items:center;min-height:100vh}
.preview{width:1100px;height:750px;background:#0D1117;display:flex;border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.6)}
.left-bar{width:52px;background:#161B22;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;border-right:1px solid #30363D}
.left-bar .logo{color:#3B82F6;font-size:22px;margin-bottom:16px}
.left-bar .tool{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#8B949E;font-size:16px;border-radius:8px;cursor:pointer}
.left-bar .tool.active{background:rgba(59,130,246,0.2);color:#fff}
.left-bar .divider{width:24px;height:1px;background:#30363D;margin:8px 0}
.main{flex:1;display:flex}
.viewport{flex:1;background:radial-gradient(ellipse at 40% 40%, #1a2744 0%, #0D1117 100%);position:relative}
.viewport .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:50px 50px;background-position:center}
.viewport .box3d{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(25deg) rotateY(-35deg);width:180px;height:140px;perspective:800px;transform-style:preserve-3d}
.viewport .box3d .face{position:absolute;border:1px solid rgba(59,130,246,0.3);background:rgba(59,130,246,0.06)}
.viewport .box3d .front{width:180px;height:140px;transform:translateZ(60px);background:rgba(59,130,246,0.1)}
.viewport .box3d .top{width:180px;height:120px;transform:rotateX(90deg) translateZ(-70px);transform-origin:top}
.viewport .box3d .right{width:120px;height:140px;transform:rotateY(90deg) translateZ(90px);transform-origin:right}
.stats{position:absolute;top:12px;right:12px;display:flex;gap:6px}
.stats .badge{padding:3px 8px;border-radius:3px;background:rgba(22,27,34,0.9);font-size:9px;color:#484F58;font-weight:500}
.floating-tools{position:absolute;bottom:70px;left:16px;background:rgba(28,35,51,0.95);border-radius:10px;padding:10px 12px;border:1px solid #30363D;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.floating-tools .t-label{font-size:11px;font-weight:600;color:#E6EDF3;margin-bottom:6px}
.floating-tools .params{display:flex;gap:4px}
.floating-tools .chip{padding:3px 8px;border-radius:4px;font-size:10px;color:#8B949E;background:#21262D;cursor:pointer}
.floating-tools .chip.active{background:#3B82F6;color:#fff}
.right-panel{width:220px;background:#161B22;border-left:1px solid #30363D;padding:12px;overflow-y:auto}
.right-panel h3{font-size:10px;text-transform:uppercase;color:#484F58;margin-bottom:8px;letter-spacing:1px}
.right-panel .prop-group{margin-bottom:14px}
.right-panel .prop-group label{font-size:10px;color:#8B949E;display:block;margin-bottom:3px}
.right-panel .prop-group .value{font-size:11px;color:#E6EDF3;font-weight:500;text-align:right}
.right-panel .prop-group .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.right-panel input[type=range]{width:100%;accent-color:#3B82F6;margin:4px 0}
.right-panel select{background:#21262D;color:#E6EDF3;border:1px solid #30363D;border-radius:4px;padding:2px 6px;font-size:10px}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:48px;background:rgba(22,27,34,0.95);border-top:1px solid #30363D;display:flex;align-items:center;padding:0 12px}
.bottom-bar .mode{display:flex;flex-direction:column;align-items:center;justify-content:center;width:56px;height:40px;border-radius:8px;cursor:pointer;color:#8B949E;font-size:9px;gap:1px}
.bottom-bar .mode .icon{font-size:16px}
.bottom-bar .mode.active{color:#fff;background:rgba(59,130,246,0.1)}
.bottom-bar .spacer{flex:1}
.bottom-bar .toggle{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#484F58;font-size:14px;cursor:pointer}
.tooltip{position:absolute;background:#1C2333;color:#E6EDF3;padding:4px 8px;border-radius:4px;font-size:9px;pointer-events:none;white-space:nowrap}
</style></head><body>
<div class="preview">
  <div class="left-bar">
    <div class="logo">◇</div>
    <div class="tool active" title="Select">↖</div>
    <div class="tool" title="Sketch">✎</div>
    <div class="tool" title="Extrude">↑</div>
    <div class="tool" title="Revolve">↻</div>
    <div class="tool" title="Fillet">◐</div>
    <div class="tool" title="Chamfer">◺</div>
    <div class="tool" title="Shell">▣</div>
    <div class="divider"></div>
    <div class="tool" title="Import">↓</div>
    <div class="tool" title="Export">↑</div>
  </div>
  <div style="flex:1;position:relative">
    <div class="viewport">
      <div class="grid"></div>
      <div class="box3d">
        <div class="face front"></div>
        <div class="face top"></div>
        <div class="face right"></div>
      </div>
      <div class="stats">
        <span class="badge">OCCT 8.0</span>
        <span class="badge">60 FPS</span>
        <span class="badge">PBR</span>
      </div>
      <div class="floating-tools">
        <div class="t-label">Extrude</div>
        <div style="display:flex;gap:20px;font-size:10px;color:#8B949E;margin-top:4px">
          <div>Distance <span style="color:#E6EDF3;font-weight:500;margin-left:4px">25.0 mm</span></div>
          <div>Direction <span style="color:#E6EDF3;font-weight:500;margin-left:4px">Y+</span></div>
          <div>Taper <span style="color:#E6EDF3;font-weight:500;margin-left:4px">0°</span></div>
        </div>
      </div>
      <div class="bottom-bar">
        <div class="toggle" style="color:#3B82F6">☰</div>
        <div class="spacer"></div>
        <div class="mode active"><span class="icon">▣</span>CAD</div>
        <div class="mode"><span class="icon">🖐</span>Sculpt</div>
        <div class="mode"><span class="icon">🎨</span>Paint</div>
        <div class="mode"><span class="icon">▶</span>Animate</div>
        <div class="mode"><span class="icon">📷</span>Render</div>
        <div class="spacer"></div>
        <div class="toggle" style="color:#3B82F6">☰</div>
      </div>
    </div>
  </div>
  <div class="right-panel">
    <h3>Properties</h3>
    <div class="prop-group">
      <div class="row"><label>Distance</label><span class="value">25.0 mm</span></div>
      <input type="range" value="60">
    </div>
    <div class="prop-group">
      <div class="row"><label>Direction</label>
        <select><option>Y+</option><option>Y-</option><option>X+</option></select>
      </div>
    </div>
    <div class="prop-group">
      <div class="row"><label>Taper Angle</label><span class="value">0°</span></div>
      <input type="range" value="0">
    </div>
    <div style="height:1px;background:#30363D;margin:10px 0"></div>
    <div class="prop-group">
      <div class="row"><label>Both Sides</label><input type="checkbox" style="accent-color:#3B82F6"></div>
    </div>
    <div class="prop-group">
      <div class="row"><label>Solid</label><input type="checkbox" checked style="accent-color:#3B82F6"></div>
    </div>
  </div>
</div>
</body></html>
