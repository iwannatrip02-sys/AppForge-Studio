name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
      
      - name: Generate Xcode Project
        run: cd ios-app/AppForgeStudio && swift package generate-xcodeproj
      
      - name: Build
        run: |
          cd ios-app/AppForgeStudio
          xcodebuild -project AppForgeStudio.xcodeproj -scheme AppForgeStudio -sdk iphoneos -configuration Release clean build CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath ../build
      
      - name: Package .app
        run: |
          cd ios-app
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/AppForgeStudio.app Payload/
          zip -r AppForgeStudio.ipa Payload
      
      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: AppForgeStudio-ipa
          path: ios-app/AppForgeStudio.ipa