name: Build AppForgeStudio for iPad

on:
  push:
    branches: ["main", "develop", "feature/*", "fix/*", "fase-*"]
    paths:
      - 'ios-app/AppForgeStudio/**'
      - 'ios-app/SketchKernel/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build AppForgeStudio
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode (Swift 6.1+ required)
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null
          echo "=== Default Swift ==="
          swift --version
          echo "=== Trying to find Swift 6.1+ ==="
          FOUND=false
          for xcode in /Applications/Xcode_16*.app /Applications/Xcode_17*.app /Applications/Xcode.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode" 2>/dev/null || true
              SWIFT_VER=$(swift --version 2>/dev/null | head -1)
              echo "Tried $xcode: $SWIFT_VER"
              if echo "$SWIFT_VER" | grep -qE 'version (6\.[1-9]|[7-9])'; then
                FOUND=true
                echo "=== Using $xcode ($SWIFT_VER) ==="
                break
              fi
            fi
          done
          if [ "$FOUND" = false ]; then
            echo "=== Installing Swift 6.1 manually ==="
            curl -sL https://download.swift.org/swift-6.1-release/xcode/swift-6.1-RELEASE/swift-6.1-RELEASE-osx.pkg -o /tmp/swift.pkg
            sudo installer -pkg /tmp/swift.pkg -target /
            export TOOLCHAINS=swift
            swift --version
          fi
          echo "=== Final: $(swift --version | head -1) ==="

      # Tests del kernel de sketch (Fase 1): paquete puro, corre en segundos en
      # el host macOS — falla rápido ANTES del build pesado de la app.
      - name: Run SketchKernel tests (host)
        run: swift test --package-path ios-app/SketchKernel

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios-app/AppForgeStudio
        run: |
          xcodegen generate
          echo "=== Generated project ==="
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Resolve SPM dependencies (OCCTSwift + Satin)
        working-directory: ios-app/AppForgeStudio
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AppForgeStudio.xcodeproj \
            -scheme AppForgeStudio \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData

      # SatinCore .mm files (Triangulator, Generators, ...) violate -Wc++11-narrowing
      # across many call sites; per-file sed patching does not scale. The narrowing
      # warning-as-error is suppressed globally via OTHER_CPLUSPLUSFLAGS on each
      # xcodebuild invocation below instead.

      - name: Install iOS Simulator runtime
        run: |
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          echo "=== Downloading iOS 18.4 Simulator ==="
          xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || true
          echo "=== Runtimes after install ==="
          xcrun simctl list runtimes

      - name: Build for iOS (iPad Simulator)
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Starting build ==="
          set -o pipefail
          if [ -d "AppForgeStudio.xcodeproj" ]; then
            xcodebuild build \
              -project AppForgeStudio.xcodeproj \
              -scheme AppForgeStudio \
              -sdk iphonesimulator \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug \
              -derivedDataPath DerivedData \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY=- \
              OTHER_CODE_SIGN_FLAGS=--deep \
              OTHER_CPLUSPLUSFLAGS='$(inherited) -Wno-c++11-narrowing' \
              2>&1 | tee build.log
          else
            echo "No xcodeproj found"
            exit 1
          fi

      - name: Inspect built app bundle (diagnóstico bundle ID)
        working-directory: ios-app/AppForgeStudio
        run: |
          APP=DerivedData/Build/Products/Debug-iphonesimulator/AppForgeStudio.app
          echo "=== Contenido del .app ==="
          ls -la "$APP" || true
          echo "=== Info.plist procesado (app) ==="
          plutil -p "$APP/Info.plist" || echo "SIN Info.plist legible"
          echo "=== Info.plist del xctest plugin ==="
          plutil -p "$APP/PlugIns/AppForgeStudioTests.xctest/Info.plist" || echo "SIN plist en xctest"

      - name: Run Tests (iOS Simulator)
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Starting tests ==="
          set -o pipefail
          xcodebuild test \
            -project AppForgeStudio.xcodeproj \
            -scheme AppForgeStudio \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            OTHER_CODE_SIGN_FLAGS=--deep \
            OTHER_CPLUSPLUSFLAGS='$(inherited) -Wno-c++11-narrowing' \
            2>&1 | tee test.log

      # Sin continue-on-error: si el IPA no sale, el workflow debe quedar rojo
      # (el IPA es el entregable para AltStore — un verde sin IPA es un botón falso).
      - name: Archive and Package Unsigned IPA (device)
        if: success()
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Archiving for device (unsigned) ==="
          set -o pipefail
          xcodebuild archive \
            -project AppForgeStudio.xcodeproj \
            -scheme AppForgeStudio \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_CPLUSPLUSFLAGS='$(inherited) -Wno-c++11-narrowing' \
            -archivePath AppForgeStudio.xcarchive \
            2>&1 | tee archive.log
          echo "=== Packaging unsigned IPA ==="
          mkdir -p Payload
          APP_PATH=$(find AppForgeStudio.xcarchive/Products/Applications -name "*.app" -type d 2>/dev/null | head -1)
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" Payload/
            zip -r AppForgeStudio-unsigned.ipa Payload/
            ls -lh AppForgeStudio-unsigned.ipa
            echo "=== IPA packaging complete ==="
          else
            echo "=== ERROR: .app not found in xcarchive. Available paths: ==="
            find AppForgeStudio.xcarchive -maxdepth 4 -type d 2>/dev/null || true
            exit 1
          fi

      - name: Upload Unsigned IPA
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: AppForgeStudio-unsigned-ipa
          path: ios-app/AppForgeStudio/AppForgeStudio-unsigned.ipa
          retention-days: 14

      - name: Upload build and test logs (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-${{ github.run_id }}
          path: |
            ios-app/AppForgeStudio/build.log
            ios-app/AppForgeStudio/test.log
