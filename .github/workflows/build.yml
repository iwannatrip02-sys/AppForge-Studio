name: Build AppForgeStudio for iPad

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'ios-app/AppForgeStudio/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build AppForgeStudio
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.1+ required)
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null
          echo "=== Default Swift ==="
          swift --version
          echo "=== Trying to find Swift 6.1+ ==="
          FOUND=false
          for xcode in /Applications/Xcode_16*.app /Applications/Xcode_17*.app /Applications/Xcode.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode" 2>/dev/null || true
              SWIFT_VER=$(swift --version 2>/dev/null | head -1)
              echo "Tried $xcode: $SWIFT_VER"
              if echo "$SWIFT_VER" | grep -qE 'version (6\.[1-9]|[7-9])'; then
                FOUND=true
                echo "=== Using $xcode ($SWIFT_VER) ==="
                break
              fi
            fi
          done
          if [ "$FOUND" = false ]; then
            echo "=== Installing Swift 6.1 manually ==="
            curl -sL https://download.swift.org/swift-6.1-release/xcode/swift-6.1-RELEASE/swift-6.1-RELEASE-osx.pkg -o /tmp/swift.pkg
            sudo installer -pkg /tmp/swift.pkg -target /
            export TOOLCHAINS=swift
            swift --version
          fi
          echo "=== Final: $(swift --version | head -1) ==="

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios-app/AppForgeStudio
        run: |
          xcodegen generate
          echo "=== Generated project ==="
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Resolve SPM dependencies (OCCTSwift + Satin)
        working-directory: ios-app/AppForgeStudio
        run: |
          if [ -f "*.xcodeproj/project.pbxproj" ]; then
            xcodebuild -resolvePackageDependencies -project AppForgeStudio.xcodeproj -scheme AppForgeStudio -destination 'generic/platform=iOS'
          else
            swift package resolve
          fi

      - name: Install iOS Simulator runtime
        run: |
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          echo "=== Downloading iOS 18.4 Simulator ==="
          xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || true
          echo "=== Runtimes after install ==="
          xcrun simctl list runtimes

      - name: Build for iOS (iPad Simulator)
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Starting build ==="
          if [ -d "AppForgeStudio.xcodeproj" ]; then
            xcodebuild build \
              -project AppForgeStudio.xcodeproj \
              -scheme AppForgeStudio \
              -sdk iphonesimulator \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tee build.log
            echo "=== Build exit code: $? ==="
            tail -50 build.log
          else
            echo "No xcodeproj found"
            exit 1
          fi

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: |
            ios-app/AppForgeStudio/build.log
