name: Build AppForgeStudio for iPad

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'ios-app/AppForgeStudio/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build AppForgeStudio
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.1+ required)
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null
          echo "=== Current Xcode ==="
          xcode-select -p
          swift --version
          echo "=== Trying Xcode 16.x ==="
          for xcode in /Applications/Xcode_16*.app; do
            if [ -d "$xcode" ]; then
              echo "Found: $xcode"
              sudo xcode-select -s "$xcode"
              echo "Selected: $(xcode-select -p)"
              swift --version
              break
            fi
          done
          echo "=== Final Swift version ==="
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios-app/AppForgeStudio
        run: |
          xcodegen generate
          echo "=== Generated project ==="
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Resolve SPM dependencies (OCCTSwift + Satin)
        working-directory: ios-app/AppForgeStudio
        run: |
          if [ -f "*.xcodeproj/project.pbxproj" ]; then
            xcodebuild -resolvePackageDependencies -project AppForgeStudio.xcodeproj -scheme AppForgeStudio -destination 'generic/platform=iOS'
          else
            swift package resolve
          fi

      - name: Build for iOS (iPad)
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Starting build ==="
          if [ -d "AppForgeStudio.xcodeproj" ]; then
            xcodebuild build \
              -project AppForgeStudio.xcodeproj \
              -scheme AppForgeStudio \
              -destination 'generic/platform=iOS' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tee build.log
            echo "=== Build exit code: $? ==="
            echo "=== Last 50 lines of build log ==="
            tail -50 build.log
          else
            echo "No xcodeproj found, trying swift build..."
            swift build --configuration debug 2>&1 | tee build.log
            echo "=== Last 50 lines ==="
            tail -50 build.log
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: |
            ios-app/AppForgeStudio/build.log
            ~/Library/Logs/**/*.log

      - name: Create .app artifact
        if: success()
        working-directory: ios-app/AppForgeStudio
        run: |
          mkdir -p artifacts
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Build/Products/*" -exec cp -R {} artifacts/ \; 2>/dev/null || echo "No .app found"
          ls -la artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AppForgeStudio-iOS
          path: ios-app/AppForgeStudio/artifacts/
