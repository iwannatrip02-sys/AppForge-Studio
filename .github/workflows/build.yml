name: Build AppForgeStudio for iPad

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'ios-app/AppForgeStudio/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build AppForgeStudio
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode (Swift 6.1+ required)
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null
          echo "=== Default Swift ==="
          swift --version
          echo "=== Trying to find Swift 6.1+ ==="
          FOUND=false
          for xcode in /Applications/Xcode_16*.app /Applications/Xcode_17*.app /Applications/Xcode.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode" 2>/dev/null || true
              SWIFT_VER=$(swift --version 2>/dev/null | head -1)
              echo "Tried $xcode: $SWIFT_VER"
              if echo "$SWIFT_VER" | grep -qE 'version (6\.[1-9]|[7-9])'; then
                FOUND=true
                echo "=== Using $xcode ($SWIFT_VER) ==="
                break
              fi
            fi
          done
          if [ "$FOUND" = false ]; then
            echo "=== Installing Swift 6.1 manually ==="
            curl -sL https://download.swift.org/swift-6.1-release/xcode/swift-6.1-RELEASE/swift-6.1-RELEASE-osx.pkg -o /tmp/swift.pkg
            sudo installer -pkg /tmp/swift.pkg -target /
            export TOOLCHAINS=swift
            swift --version
          fi
          echo "=== Final: $(swift --version | head -1) ==="

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios-app/AppForgeStudio
        run: |
          xcodegen generate
          echo "=== Generated project ==="
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Resolve SPM dependencies (OCCTSwift + Satin)
        working-directory: ios-app/AppForgeStudio
        run: |
          if [ -f "*.xcodeproj/project.pbxproj" ]; then
            xcodebuild -resolvePackageDependencies -project AppForgeStudio.xcodeproj -scheme AppForgeStudio -destination 'generic/platform=iOS'
          else
            swift package resolve
          fi

      - name: Patch SatinCore C++ narrowing errors (Triangulator.mm)
        run: |
          TRIANGULATOR=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name Triangulator.mm -path "*/Satin/*" 2>/dev/null | head -1)
          if [ -f "$TRIANGULATOR" ]; then
            echo "Found: $TRIANGULATOR"
            sed -i '' 's/\.i0 = v1->index, \.i1 = v2->index, \.i2 = v3->index/.i0 = static_cast<uint32_t>(v1->index), .i1 = static_cast<uint32_t>(v2->index), .i2 = static_cast<uint32_t>(v3->index)/g' "$TRIANGULATOR"
            sed -i '' 's/\.i0 = v1->index/.i0 = static_cast<uint32_t>(v1->index)/g' "$TRIANGULATOR"
            sed -i '' 's/\.index = index/.index = static_cast<int>(index)/g' "$TRIANGULATOR"
            echo "Patched successfully"
          else
            echo "Triangulator.mm not found, continuing..."
          fi

      - name: Install iOS Simulator runtime
        run: |
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes
          echo "=== Downloading iOS 18.4 Simulator ==="
          xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || true
          echo "=== Runtimes after install ==="
          xcrun simctl list runtimes

      - name: Build for iOS (iPad Simulator)
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Starting build ==="
          if [ -d "AppForgeStudio.xcodeproj" ]; then
            xcodebuild build \
              -project AppForgeStudio.xcodeproj \
              -scheme AppForgeStudio \
              -sdk iphonesimulator \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tee build.log
            echo "=== Build exit code: $? ==="
            tail -50 build.log
          else
            echo "No xcodeproj found"
            exit 1
          fi

      - name: Run Tests (iOS Simulator)
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Starting tests ==="
          xcodebuild test \
            -project AppForgeStudio.xcodeproj \
            -scheme AppForgeStudio \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test.log
          echo "=== Tests exit code: $? ==="
          tail -50 test.log

      - name: Archive and Package Unsigned IPA (device)
        if: success()
        continue-on-error: true
        working-directory: ios-app/AppForgeStudio
        run: |
          echo "=== Re-applying SatinCore narrowing patch (SPM may have refreshed checkouts) ==="
          for TRIANGULATOR in $(find /Users/runner/Library/Developer/Xcode/DerivedData -name Triangulator.mm -path "*/Satin/*" 2>/dev/null); do
            echo "Patching: $TRIANGULATOR"
            sed -i '' 's/\.i0 = v1->index, \.i1 = v2->index, \.i2 = v3->index/.i0 = static_cast<uint32_t>(v1->index), .i1 = static_cast<uint32_t>(v2->index), .i2 = static_cast<uint32_t>(v3->index)/g' "$TRIANGULATOR"
            sed -i '' 's/\.i0 = v1->index/.i0 = static_cast<uint32_t>(v1->index)/g' "$TRIANGULATOR"
            sed -i '' 's/\.index = index/.index = static_cast<int>(index)/g' "$TRIANGULATOR"
            grep -c "static_cast<uint32_t>" "$TRIANGULATOR" || echo "WARNING: patch produced no static_cast"
          done
          echo "=== Archiving for device (unsigned) ==="
          set -o pipefail
          xcodebuild archive \
            -project AppForgeStudio.xcodeproj \
            -scheme AppForgeStudio \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath AppForgeStudio.xcarchive \
            2>&1 | tee archive.log
          ARCHIVE_EXIT=$?
          echo "=== Archive exit code: $ARCHIVE_EXIT ==="
          tail -30 archive.log
          echo "=== Packaging unsigned IPA ==="
          mkdir -p Payload
          APP_PATH=$(find AppForgeStudio.xcarchive/Products/Applications -name "*.app" -type d 2>/dev/null | head -1)
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" Payload/
            zip -r AppForgeStudio-unsigned.ipa Payload/
            ls -lh AppForgeStudio-unsigned.ipa
            echo "=== IPA packaging complete ==="
          else
            echo "=== ERROR: .app not found in xcarchive. Available paths: ==="
            find AppForgeStudio.xcarchive -maxdepth 4 -type d 2>/dev/null || true
            echo "=== Skipping IPA packaging ==="
          fi

      - name: Upload Unsigned IPA
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: AppForgeStudio-unsigned-ipa
          path: ios-app/AppForgeStudio/AppForgeStudio-unsigned.ipa
          retention-days: 14

      - name: Upload build and test logs (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-${{ github.run_id }}
          path: |
            ios-app/AppForgeStudio/build.log
            ios-app/AppForgeStudio/test.log
